<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junseo Blog</title>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <!-- /template/header.html이 동적으로 로드됩니다. -->
    </header>

    <div class="body-container">
        <aside class="sidebar left-sidebar"></aside>
        <main id="content">
            <article id="post-container">
                <!-- 게시물 내용이 main.js에 의해 동적으로 렌더링됩니다. -->
            </article>
        </main>
        <aside class="sidebar right-sidebar">
            <nav id="toc-container">
                <h3>목차</h3>
                <ul id="toc-list"></ul>
            </nav>
        </aside>
    </div>

    <footer>
        <!-- /template/footer.html이 동적으로 로드됩니다. -->
    </footer>

    <!-- 라이브러리 (README.md에 따라 로컬 경로 사용) -->
    <script src="./asset/lib/marked.min.js"></script>

    <!-- 블로그 데이터 및 스크립트 -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
